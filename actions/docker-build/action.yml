name: "Docker Build"
description: "Reusable Docker build action with build-args support"
inputs:
  push:
    description: "Whether to push the image"
    required: true
    default: "false"
  tags:
    description: "Tags to apply to the image"
    required: true
    default: "validation"
  build-args:
    description: "Build arguments as key=value pairs"
    required: true
    default: ""
  cache-from:
    description: "Cache sources"
    required: false
    default: "type=gha"
  cache-to:
    description: "Cache destination"
    required: false
    default: "type=gha,mode=max"
  image-name:
    description: "Image name (without registry prefix)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: ${{ inputs.push }}
        tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ inputs.tags }}
        build-args: ${{ inputs.build-args }}
        cache-from: ${{ inputs.cache-from }}
        cache-to: ${{ inputs.cache-to }}
