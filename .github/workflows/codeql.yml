name: CodeQL Analysis

on:
  workflow_call:
    inputs:
      language:
        type: string
        default: 'auto'
        description: 'CodeQL language: auto, javascript-typescript, python, go, java, c-cpp, csharp, ruby, swift'
      query_suite:
        type: string
        default: 'security-and-quality'
        description: 'CodeQL query suite'
      build_command:
        type: string
        default: ''
        description: 'Optional custom build command for compiled languages'
      runners:
        type: string
        default: 'ubuntu-latest'
        description: 'Runner label(s), JSON array or string'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  detect-languages:
    name: Detect Languages
    runs-on: ${{ fromJSON(startsWith(inputs.runners, '[') && inputs.runners || format('["{0}"]', inputs.runners)) }}
    outputs:
      languages: ${{ steps.detect.outputs.languages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect CodeQL languages
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.language }}" != 'auto' ]; then
            echo "languages=[\"${{ inputs.language }}\"]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          languages=()
          find_first() {
            find . -path './.git' -prune -o \( "$@" \) -print -quit
          }

          if [ -n "$(find_first -name 'package.json' -o -name '*.js' -o -name '*.jsx' -o -name '*.ts' -o -name '*.tsx')" ]; then
            languages+=("javascript-typescript")
          fi
          if [ -n "$(find_first -name 'pyproject.toml' -o -name 'requirements.txt' -o -name 'setup.py' -o -name '*.py')" ]; then
            languages+=("python")
          fi
          if [ -n "$(find_first -name 'go.mod' -o -name '*.go')" ]; then
            languages+=("go")
          fi

          if [ "${#languages[@]}" -eq 0 ]; then
            languages+=("javascript-typescript")
          fi

          json=$(printf '%s\n' "${languages[@]}" | python3 -c "import json, sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))")
          echo "languages=$json" >> "$GITHUB_OUTPUT"

  analyze:
    name: CodeQL Analyze
    needs: detect-languages
    runs-on: ${{ fromJSON(startsWith(inputs.runners, '[') && inputs.runners || format('["{0}"]', inputs.runners)) }}
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect-languages.outputs.languages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.query_suite }}

      - name: Autobuild
        if: inputs.build_command == ''
        uses: github/codeql-action/autobuild@v3

      - name: Custom build
        if: inputs.build_command != ''
        run: ${{ inputs.build_command }}

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
