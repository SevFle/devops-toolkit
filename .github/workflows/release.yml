name: Release

on:
  workflow_call:
    inputs:
      version_bump:
        type: string
        required: true
        description: 'major, minor, or patch'
      pre_release:
        type: boolean
        default: false
      dry_run:
        type: boolean
        default: false
      node_version:
        type: string
        default: '22'
      test_command:
        type: string
        default: 'npm test'
      build_command:
        type: string
        default: 'npm run build'
      lint_command:
        type: string
        default: 'npm run lint'
      typecheck_command:
        type: string
        default: 'npm run type-check'
      publish_npm:
        type: boolean
        default: false
      generate_notes:
        type: boolean
        default: false
        description: 'Generate AI-powered release notes using Claude'
      runners:
        type: string
        default: 'self-hosted'
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ fromJSON(startsWith(inputs.runners, '[') && inputs.runners || format('["{0}"]', inputs.runners)) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          if [ "${{ inputs.pre_release }}" = "true" ]; then
            PRE_ID="beta.$(date +%Y%m%d%H%M%S)"
            NEW_VERSION=$(npm version ${{ inputs.version_bump }} --preid=$PRE_ID --no-git-tag-version | sed 's/^v//')
          else
            NEW_VERSION=$(npm version ${{ inputs.version_bump }} --no-git-tag-version | sed 's/^v//')
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - run: npm ci
      - run: ${{ inputs.test_command }}
      - run: ${{ inputs.typecheck_command }}
      - run: ${{ inputs.build_command }}
      - run: ${{ inputs.lint_command }}

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to v${{ steps.bump.outputs.version }}"
          git tag v${{ steps.bump.outputs.version }}
          git push origin HEAD
          git push origin v${{ steps.bump.outputs.version }}

      - name: Checkout devops-toolkit
        if: inputs.generate_notes
        uses: actions/checkout@v6
        with:
          repository: SevFle/devops-toolkit
          path: .devops-toolkit
          ref: main

      - name: Generate AI release notes
        if: inputs.generate_notes
        id: ai-notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)

          PROMPT_FILE=$(mktemp /tmp/release-notes-prompt-XXXXXX.md)
          cat .devops-toolkit/prompts/release-notes.prompt.md > "$PROMPT_FILE"

          echo "" >> "$PROMPT_FILE"
          echo "---" >> "$PROMPT_FILE"
          echo "## Configuration" >> "$PROMPT_FILE"
          echo "- include_internal: false" >> "$PROMPT_FILE"
          echo "" >> "$PROMPT_FILE"
          echo "## Git Log ($PREV_TAG..HEAD)" >> "$PROMPT_FILE"
          echo '```' >> "$PROMPT_FILE"
          git log --oneline "$PREV_TAG..HEAD" >> "$PROMPT_FILE"
          echo '```' >> "$PROMPT_FILE"
          echo "" >> "$PROMPT_FILE"
          echo "## Diff Stats" >> "$PROMPT_FILE"
          echo '```' >> "$PROMPT_FILE"
          git diff --stat "$PREV_TAG..HEAD" >> "$PROMPT_FILE" 2>/dev/null || true
          echo '```' >> "$PROMPT_FILE"
          echo "" >> "$PROMPT_FILE"
          echo "## Merged Pull Requests" >> "$PROMPT_FILE"
          echo '```' >> "$PROMPT_FILE"
          gh pr list --state merged --base main --json number,title,author,labels --limit 100 2>/dev/null >> "$PROMPT_FILE" || true
          echo '```' >> "$PROMPT_FILE"

          RESPONSE_FILE=$(mktemp /tmp/release-notes-response-XXXXXX.txt)
          cat "$PROMPT_FILE" | opencode run \
            --model "zai-coding-plan/glm-5" > "$RESPONSE_FILE" 2>&1 || true

          NOTES_FILE=$(mktemp /tmp/release-notes-final-XXXXXX.md)
          sed '/^```markdown$/d; /^```$/d' "$RESPONSE_FILE" > "$NOTES_FILE"

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          {
            echo "body<<${EOF_MARKER}"
            cat "$NOTES_FILE"
            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"

          rm -f "$PROMPT_FILE" "$RESPONSE_FILE" "$NOTES_FILE" 2>/dev/null || true

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: Release v${{ steps.bump.outputs.version }}
          body: ${{ steps.ai-notes.outputs.body || '' }}
          draft: false
          prerelease: ${{ inputs.pre_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: inputs.publish_npm && !inputs.dry_run
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "### Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** ${{ inputs.version_bump }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry run:** ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
