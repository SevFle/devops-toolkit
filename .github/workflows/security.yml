name: Security Scanning

on:
  workflow_call:
    inputs:
      severity_threshold:
        type: string
        default: 'high'
        description: 'Minimum severity to report (low, medium, high, critical)'
      scan_docker:
        type: boolean
        default: false
        description: 'Whether to scan Docker image with Trivy'
      generate_sbom:
        type: boolean
        default: true
        description: 'Generate a CycloneDX SBOM artifact'
      ignore_paths:
        type: string
        default: ''
        description: 'Comma-separated paths to ignore in scans'
      runners:
        type: string
        default: 'self-hosted'
        description: 'Runner label(s), JSON array or string'
    secrets:
      NOTIFY_WEBHOOK_URL:
        required: false

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ${{ fromJSON(startsWith(inputs.runners, '[') && inputs.runners || format('["{0}"]', inputs.runners)) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Apply ignore paths
        if: inputs.ignore_paths != ''
        shell: bash
        env:
          IGNORE_PATHS: ${{ inputs.ignore_paths }}
        run: |
          set -euo pipefail
          IFS=',' read -ra PATHS <<< "$IGNORE_PATHS"
          for path in "${PATHS[@]}"; do
            trimmed=$(echo "$path" | xargs)
            if [ -n "$trimmed" ] && [ -e "$trimmed" ]; then
              rm -rf "$trimmed"
            fi
          done

      - name: Detect project type
        id: detect
        run: |
          set -euo pipefail
          echo "has_node=$(test -f package.json && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_python_requirements=$(test -f requirements.txt && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_python_pyproject=$(test -f pyproject.toml && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_go=$(test -f go.mod && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Node.js audit
        if: steps.detect.outputs.has_node == 'true'
        run: |
          set -euo pipefail
          npm audit --audit-level=${{ inputs.severity_threshold }} --json > npm-audit.json || true
          echo "## npm audit results" >> "$GITHUB_STEP_SUMMARY"
          npm audit --audit-level=${{ inputs.severity_threshold }} 2>&1 | tail -20 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Python audit (requirements.txt)
        if: steps.detect.outputs.has_python_requirements == 'true'
        run: |
          set -euo pipefail
          pip install pip-audit
          pip-audit -r requirements.txt --format json --output pip-audit.json || true
          pip-audit -r requirements.txt --desc >> "$GITHUB_STEP_SUMMARY" || true

      - name: Python audit (pyproject.toml)
        if: steps.detect.outputs.has_python_pyproject == 'true' && steps.detect.outputs.has_python_requirements == 'false'
        run: |
          set -euo pipefail
          pip install pip-audit
          pip-audit --format json --output pip-audit.json || true
          pip-audit --desc >> "$GITHUB_STEP_SUMMARY" || true

      - name: Go vulnerability check
        if: steps.detect.outputs.has_go == 'true'
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... >> "$GITHUB_STEP_SUMMARY" 2>&1 || true

  container-scan:
    name: Container Scan
    if: inputs.scan_docker
    runs-on: ${{ fromJSON(startsWith(inputs.runners, '[') && inputs.runners || format('["{0}"]', inputs.runners)) }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image for scanning
        uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: scan-target:latest

      - name: Run Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 'scan-target:latest'
          format: 'table'
          severity: ${{ inputs.severity_threshold == 'low' && 'LOW,MEDIUM,HIGH,CRITICAL' || inputs.severity_threshold == 'medium' && 'MEDIUM,HIGH,CRITICAL' || inputs.severity_threshold == 'high' && 'HIGH,CRITICAL' || 'CRITICAL' }}
          exit-code: '1'

  sbom:
    name: SBOM
    if: inputs.generate_sbom
    runs-on: ${{ fromJSON(startsWith(inputs.runners, '[') && inputs.runners || format('["{0}"]', inputs.runners)) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-sbom
          path: sbom.cdx.json
          retention-days: 7

  security-status:
    name: Security Status
    if: always()
    runs-on: ${{ fromJSON(startsWith(inputs.runners, '[') && inputs.runners || format('["{0}"]', inputs.runners)) }}
    needs: [dependency-audit, container-scan, sbom]
    steps:
      - name: Check results
        id: status
        run: |
          set -euo pipefail
          echo "## Security Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Container Scan | ${{ needs.container-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM | ${{ needs.sbom.result }} |" >> "$GITHUB_STEP_SUMMARY"

          overall='success'

          if [[ "${{ needs.dependency-audit.result }}" == "failure" ]]; then
            overall='failure'
            echo "::error::Security checks failed"
          fi

          if [[ "${{ needs.container-scan.result }}" == "failure" ]]; then
            overall='failure'
            echo "::error::Container scan failed"
          fi

          if [[ "${{ inputs.generate_sbom }}" == "true" ]] && [[ "${{ needs.sbom.result }}" == "failure" ]]; then
            overall='failure'
            echo "::error::SBOM generation failed"
          fi

          echo "overall=$overall" >> "$GITHUB_OUTPUT"

          if [[ "$overall" == 'failure' ]]; then
            exit 1
          fi

          echo "All security checks passed!"

      - name: Notify webhook
        if: always() && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          payload=$(python3 - <<'PY'
          import json

          payload = {
              'workflow': 'security',
              'repository': '${{ github.repository }}',
              'run_id': '${{ github.run_id }}',
              'status': '${{ steps.status.outputs.overall }}',
              'dependency_audit': '${{ needs.dependency-audit.result }}',
              'container_scan': '${{ needs.container-scan.result }}',
              'sbom': '${{ needs.sbom.result }}',
          }
          print(json.dumps(payload))
          PY
          )
          curl -fsSL -X POST -H 'Content-Type: application/json' -d "$payload" "$WEBHOOK_URL"
