name: OpenSpec Propose

on:
  workflow_call:
    inputs:
      ai_model:
        type: string
        default: 'claude-sonnet-4-5-20250514'
        description: 'Claude model for artifact generation'
      base_branch:
        type: string
        default: 'develop'
        description: 'Base branch for the proposal PR'
      runners:
        type: string
        default: 'self-hosted'
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      OPENSPEC_GH_TOKEN:
        required: true

concurrency:
  group: openspec-propose-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  openspec-propose:
    if: >-
      github.event.comment.user.type != 'Bot'
      && !github.event.issue.pull_request
      && startsWith(github.event.comment.body, '/propose')
    runs-on: ${{ fromJSON(format('["{0}"]', inputs.runners)) }}
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.base_branch }}

      - name: Configure Git
        run: |
          git config --global user.name "openspec-auto[bot]"
          git config --global user.email "openspec-auto[bot]@users.noreply.github.com"

      - name: Clear git auth header
        run: git config --local --unset-all http.https://github.com/.extraheader || true

      - name: Validate commenter permissions
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner, repo: context.repo.repo,
              username: context.payload.comment.user.login
            });
            if (!['admin', 'write', 'maintain'].includes(data.permission)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${context.payload.comment.user.login} You need write access to use \`/propose\`.`
              });
              core.setFailed('Insufficient permissions');
            }

      - name: Validate labels
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number
            });
            if (!issue.labels.some(l => l.name === 'interview finished')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: 'Cannot run `/propose` - this issue needs the `interview finished` label first.'
              });
              core.setFailed('Missing "interview finished" label');
            }

      - name: Derive change name
        id: derive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q '.title')
          CHANGE_NAME=$(echo "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9 ]//g' \
            | sed 's/  */ /g' \
            | sed 's/ /-/g' \
            | cut -c1-50 \
            | sed 's/-$//')
          echo "change_name=$CHANGE_NAME" >> "$GITHUB_OUTPUT"
          echo "branch_name=openspec/$CHANGE_NAME" >> "$GITHUB_OUTPUT"

          EXISTING_PR=$(gh pr list \
            --head "openspec/$CHANGE_NAME" \
            --state open \
            --json number,url \
            -q '.[0].url // empty' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            gh issue comment "$ISSUE_NUMBER" \
              --body "A proposal PR already exists: $EXISTING_PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect interview context
        if: steps.derive.outputs.skip != 'true'
        id: context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CONTEXT_FILE=$(mktemp)
          echo "context_file=$CONTEXT_FILE" >> "$GITHUB_OUTPUT"
          ISSUE_JSON=$(gh issue view "$ISSUE_NUMBER" --json title,body)
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          ISSUE_BODY=$(echo "$ISSUE_JSON" | jq -r '.body // ""')
          {
            echo "# Issue: $ISSUE_TITLE"
            echo ""
            echo "## Issue Description"
            echo "$ISSUE_BODY"
            echo ""
            echo "## Interview Q&A"
          } > "$CONTEXT_FILE"
          gh api "repos/$REPO/issues/$ISSUE_NUMBER/comments" --paginate \
            --jq '.[] | {user_type: .user.type, body: .body}' \
          | jq -rs '
            . as $comments |
            reduce range(length) as $i (
              {pairs: [], current_q: null};
              if $comments[$i].user_type == "Bot" then
                ($comments[$i].body | capture("### (?<q>[^\n]+)") // null) as $match |
                if $match then .current_q = $match.q else . end
              elif $comments[$i].user_type != "Bot" then
                ($comments[$i].body | capture("^\\s*/interview\\s+(?<a>[\\s\\S]+)") // null) as $match |
                if $match and .current_q then
                  .pairs += [{q: .current_q, a: ($match.a | ltrimstr("\n") | rtrimstr("\n"))}] |
                  .current_q = null
                else . end
              else . end
            ) | .pairs[] | "### Q: \(.q)\n**Answer:** \(.a)\n"
          ' >> "$CONTEXT_FILE" 2>/dev/null || true

      - name: Scaffold change directory
        if: steps.derive.outputs.skip != 'true'
        env:
          CHANGE_NAME: ${{ steps.derive.outputs.change_name }}
        run: |
          if [ ! -d "openspec/changes/$CHANGE_NAME" ]; then
            npx openspec new change "$CHANGE_NAME"
          fi

      - name: Generate artifacts
        if: steps.derive.outputs.skip != 'true'
        env:
          CHANGE_NAME: ${{ steps.derive.outputs.change_name }}
          CONTEXT_FILE: ${{ steps.context.outputs.context_file }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_MODEL: ${{ inputs.ai_model }}
        run: |
          set -euo pipefail
          CHANGE_DIR="openspec/changes/$CHANGE_NAME"
          PROJECT_CONTEXT=$(cat openspec/project.md 2>/dev/null || echo "(no project.md)")
          INTERVIEW_CONTEXT=$(cat "$CONTEXT_FILE")

          STATUS_JSON=$(npx openspec status --change "$CHANGE_NAME" --json 2>/dev/null \
            | grep -v '^\-' | grep -v 'Failed to parse' | jq -c '.')
          ARTIFACT_IDS=$(echo "$STATUS_JSON" | jq -r '.artifacts[] | select(.status != "done") | .id')

          if [ -z "$ARTIFACT_IDS" ]; then echo "All artifacts done"; exit 0; fi

          for ARTIFACT_ID in $ARTIFACT_IDS; do
            echo "=== Generating: $ARTIFACT_ID ==="
            INSTR_JSON=$(npx openspec instructions "$ARTIFACT_ID" --change "$CHANGE_NAME" --json 2>/dev/null \
              | grep -v '^\-' | grep -v 'Failed to parse' | jq -c '.')
            OUTPUT_PATH=$(echo "$INSTR_JSON" | jq -r '.outputPath')
            INSTRUCTION=$(echo "$INSTR_JSON" | jq -r '.instruction')
            TEMPLATE=$(echo "$INSTR_JSON" | jq -r '.template')
            DEPS=$(echo "$INSTR_JSON" | jq -r '.dependencies[]? // empty')

            DEP_CONTEXT=""
            for DEP in $DEPS; do
              DEP_INSTR=$(npx openspec instructions "$DEP" --change "$CHANGE_NAME" --json 2>/dev/null \
                | grep -v '^\-' | grep -v 'Failed to parse' | jq -c '.')
              DEP_PATH=$(echo "$DEP_INSTR" | jq -r '.outputPath')
              DEP_FILE="$CHANGE_DIR/$DEP_PATH"
              if [ -f "$DEP_FILE" ]; then
                DEP_CONTEXT="${DEP_CONTEXT}
          --- BEGIN: ${DEP} ---
          $(cat "$DEP_FILE")
          --- END: ${DEP} ---"
              fi
            done

            RULES=$(echo "$INSTR_JSON" | jq -r 'if .rules then .rules else "" end' 2>/dev/null || true)
            [ "$RULES" = "null" ] && RULES=""

            PROMPT_FILE=$(mktemp)
            cat > "$PROMPT_FILE" <<PROMPT_EOF
          You are generating an OpenSpec artifact. Output ONLY Markdown. No preamble, no fences.

          ## Project Context
          ${PROJECT_CONTEXT}

          ## Interview Context
          ${INTERVIEW_CONTEXT}

          ## Artifact Instructions
          ${INSTRUCTION}

          ## Constraints
          ${RULES}

          ## Template
          ${TEMPLATE}

          ## Prior Artifacts
          ${DEP_CONTEXT}

          Generate "${ARTIFACT_ID}" now.
          PROMPT_EOF

            if [ "$ARTIFACT_ID" = "specs" ]; then
              PROPOSAL_FILE="$CHANGE_DIR/proposal.md"
              if [ -f "$PROPOSAL_FILE" ]; then
                CAPABILITIES=$(sed -n '/### New Capabilities/,/### Modified Capabilities\|## Impact/p' "$PROPOSAL_FILE" \
                  | grep -oP '`\K[^`]+' | head -10)
                [ -z "$CAPABILITIES" ] && CAPABILITIES="main"
                for CAP in $CAPABILITIES; do
                  SPEC_DIR="$CHANGE_DIR/specs/$CAP"; mkdir -p "$SPEC_DIR"
                  SPEC_PROMPT=$(mktemp)
                  cat > "$SPEC_PROMPT" <<SPEC_EOF
          Generate an OpenSpec spec for capability "${CAP}". Output ONLY Markdown.
          ## Project Context
          ${PROJECT_CONTEXT}
          ## Interview Context
          ${INTERVIEW_CONTEXT}
          ## Instructions
          ${INSTRUCTION}
          ## Prior Artifacts
          ${DEP_CONTEXT}
          Generate ONLY the spec for "${CAP}".
          SPEC_EOF
                  cat "$SPEC_PROMPT" | claude -p --model "$AI_MODEL" --max-turns 1 --allowedTools "" --output-format text > "$SPEC_DIR/spec.md" 2>&1
                  rm -f "$SPEC_PROMPT"
                  [ ! -s "$SPEC_DIR/spec.md" ] && { echo "ERROR: Empty spec for $CAP"; exit 1; }
                done
              fi
            else
              OUTPUT=$(cat "$PROMPT_FILE" | claude -p --model "$AI_MODEL" --max-turns 1 --allowedTools "" --output-format text 2>&1)
              FULL_PATH="$CHANGE_DIR/$OUTPUT_PATH"
              mkdir -p "$(dirname "$FULL_PATH")"
              echo "$OUTPUT" > "$FULL_PATH"
              [ ! -s "$FULL_PATH" ] && { echo "ERROR: Empty $ARTIFACT_ID"; exit 1; }
              echo "Generated: $FULL_PATH"
            fi
            rm -f "$PROMPT_FILE"
          done

      - name: Add label
        if: steps.derive.outputs.skip != 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, labels: ['proposal-generated']
              });
            } catch (e) { if (e.status !== 404) throw e; }

      - name: Commit and push
        if: steps.derive.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.OPENSPEC_GH_TOKEN }}
          CHANGE_NAME: ${{ steps.derive.outputs.change_name }}
          BRANCH_NAME: ${{ steps.derive.outputs.branch_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          git checkout -b "$BRANCH_NAME"
          git add "openspec/changes/$CHANGE_NAME/"
          git commit -m "docs: generate OpenSpec artifacts for $CHANGE_NAME"
          git push -u origin "$BRANCH_NAME"

      - name: Create draft PR
        if: steps.derive.outputs.skip != 'true'
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.OPENSPEC_GH_TOKEN }}
          CHANGE_NAME: ${{ steps.derive.outputs.change_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          set -euo pipefail
          PR_URL=$(gh pr create \
            --base "$BASE_BRANCH" --draft \
            --title "docs: OpenSpec artifacts for $CHANGE_NAME" \
            --body "## OpenSpec Proposal
          Auto-generated from issue #${ISSUE_NUMBER}.
          ### Review Checklist
          - [ ] Proposal captures the problem correctly
          - [ ] Design is technically sound
          - [ ] Specs have clear acceptance criteria
          - [ ] Tasks are actionable
          Resolves #${ISSUE_NUMBER}")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Post success comment
        if: steps.derive.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "OpenSpec artifacts generated! Draft PR: $PR_URL"

      - name: Handle errors
        if: failure()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `The \`/propose\` workflow failed.\n\n[View run](${runUrl})`
              });
            } catch (e) { console.log('Error:', e.message); }
