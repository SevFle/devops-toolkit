name: PR Quality Gate

on:
  workflow_call:
    inputs:
      max_lines_warn:
        type: number
        default: 400
        description: 'Lines changed threshold for warning'
      max_lines_block:
        type: number
        default: 800
        description: 'Lines changed threshold for blocking'
      require_conventional_commits:
        type: boolean
        default: true
        description: 'Require conventional commit format on PR title'
      require_changelog:
        type: boolean
        default: false
        description: 'Require CHANGELOG.md to be modified'
      require_linked_issue:
        type: boolean
        default: false
        description: 'Require the PR title or body to reference an issue'
      required_labels:
        type: string
        default: ''
        description: 'Comma-separated labels that must be present on the PR'
      branch_pattern:
        type: string
        default: ''
        description: 'Regex pattern for valid branch names'
      security_checklist_paths:
        type: string
        default: ''
        description: 'Comma-separated globs that require a security checklist acknowledgement'
      runners:
        type: string
        default: 'self-hosted'
        description: 'Runner label(s), JSON array or string'

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ${{ fromJSON(startsWith(inputs.runners, '[') && inputs.runners || format('["{0}"]', inputs.runners)) }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run quality checks
        id: checks
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_BRANCH: ${{ github.head_ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          REPO: ${{ github.repository }}
          MAX_LINES_WARN: ${{ inputs.max_lines_warn }}
          MAX_LINES_BLOCK: ${{ inputs.max_lines_block }}
          REQUIRE_CONVENTIONAL: ${{ inputs.require_conventional_commits }}
          REQUIRE_CHANGELOG: ${{ inputs.require_changelog }}
          REQUIRE_LINKED_ISSUE: ${{ inputs.require_linked_issue }}
          REQUIRED_LABELS: ${{ inputs.required_labels }}
          BRANCH_PATTERN: ${{ inputs.branch_pattern }}
          SECURITY_CHECKLIST_PATHS: ${{ inputs.security_checklist_paths }}
        run: |
          set -euo pipefail

          FAILED=false
          COMMENT="## PR Quality Gate Results\n\n| Check | Status | Details |\n|-------|--------|---------|"

          # --- Diff size check ---
          git fetch origin "$BASE_REF" --depth=1 2>/dev/null || true
          DIFF_STAT=$(git diff --stat "origin/${BASE_REF}...HEAD" 2>/dev/null | tail -1 || echo "0 files changed")
          TOTAL_LINES=$(echo "$DIFF_STAT" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          DELETED_LINES=$(echo "$DIFF_STAT" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
          CHANGED=$((TOTAL_LINES + DELETED_LINES))

          if [ "$CHANGED" -gt "$MAX_LINES_BLOCK" ]; then
            COMMENT="$COMMENT\n| Diff Size | FAIL | $CHANGED lines changed (max: $MAX_LINES_BLOCK) |"
            FAILED=true
          elif [ "$CHANGED" -gt "$MAX_LINES_WARN" ]; then
            COMMENT="$COMMENT\n| Diff Size | WARN | $CHANGED lines changed (recommended max: $MAX_LINES_WARN) |"
          else
            COMMENT="$COMMENT\n| Diff Size | PASS | $CHANGED lines changed |"
          fi

          # --- Conventional commit check ---
          if [ "$REQUIRE_CONVENTIONAL" = "true" ]; then
            PATTERN='^(feat|fix|refactor|docs|test|chore|perf|ci)(\(.+\))?: .+'
            if echo "$PR_TITLE" | grep -Eq "$PATTERN"; then
              COMMENT="$COMMENT\n| Commit Format | PASS | Title follows conventional commits |"
            else
              COMMENT="$COMMENT\n| Commit Format | FAIL | Title must match: type(scope): description |"
              FAILED=true
            fi
          fi

          # --- Changelog check ---
          if [ "$REQUIRE_CHANGELOG" = "true" ]; then
            CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only)
            if echo "$CHANGED_FILES" | grep -q "CHANGELOG.md"; then
              COMMENT="$COMMENT\n| Changelog | PASS | CHANGELOG.md updated |"
            else
              COMMENT="$COMMENT\n| Changelog | FAIL | CHANGELOG.md not updated |"
              FAILED=true
            fi
          fi

          # --- Linked issue check ---
          if [ "$REQUIRE_LINKED_ISSUE" = "true" ]; then
            if printf '%s\n%s' "$PR_TITLE" "$PR_BODY" | grep -Eiq '(^|[^A-Za-z0-9])#([0-9]+)\b|\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#([0-9]+)\b'; then
              COMMENT="$COMMENT\n| Linked Issue | PASS | Issue reference found in title or body |"
            else
              COMMENT="$COMMENT\n| Linked Issue | FAIL | Add an issue reference such as Fixes #123 |"
              FAILED=true
            fi
          fi

          # --- Required labels check ---
          if [ -n "$REQUIRED_LABELS" ]; then
            PRESENT_LABELS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" --jq '.[].name' 2>/dev/null || true)
            IFS=',' read -ra REQUIRED_LABEL_LIST <<< "$REQUIRED_LABELS"
            MISSING_LABELS=()
            for raw_label in "${REQUIRED_LABEL_LIST[@]}"; do
              label=$(echo "$raw_label" | xargs)
              if [ -n "$label" ] && ! echo "$PRESENT_LABELS" | grep -Fxq "$label"; then
                MISSING_LABELS+=("$label")
              fi
            done

            if [ "${#MISSING_LABELS[@]}" -eq 0 ]; then
              COMMENT="$COMMENT\n| Required Labels | PASS | All required labels are present |"
            else
              COMMENT="$COMMENT\n| Required Labels | FAIL | Missing: ${MISSING_LABELS[*]} |"
              FAILED=true
            fi
          fi

          # --- Branch name check ---
          if [ -n "$BRANCH_PATTERN" ]; then
            if echo "$PR_BRANCH" | grep -Eq "$BRANCH_PATTERN"; then
              COMMENT="$COMMENT\n| Branch Name | PASS | Matches pattern |"
            else
              COMMENT="$COMMENT\n| Branch Name | FAIL | Branch '$PR_BRANCH' does not match pattern '$BRANCH_PATTERN' |"
              FAILED=true
            fi
          fi

          # --- Security checklist for risky files ---
          if [ -n "$SECURITY_CHECKLIST_PATHS" ]; then
            CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only)
            if CHANGED_FILES="$CHANGED_FILES" python3 - <<'PY'
            from fnmatch import fnmatch
            import os

            files = [line.strip() for line in os.environ.get('CHANGED_FILES', '').splitlines() if line.strip()]
            patterns = [item.strip() for item in os.environ.get('SECURITY_CHECKLIST_PATHS', '').split(',') if item.strip()]
            needs_checklist = any(any(fnmatch(path, pattern) for pattern in patterns) for path in files)
            raise SystemExit(0 if needs_checklist else 1)
            PY
            then
              if printf '%s' "$PR_BODY" | grep -Fqi -- '- [x] security reviewed'; then
                COMMENT="$COMMENT\n| Risky Change Checklist | PASS | Security checklist acknowledged in PR body |"
              else
                COMMENT="$COMMENT\n| Risky Change Checklist | FAIL | Risky files changed; add '- [x] Security reviewed' to the PR body |"
                FAILED=true
              fi
            else
              COMMENT="$COMMENT\n| Risky Change Checklist | PASS | No risky paths were changed |"
            fi
          fi

          # --- Post comment ---
          echo -e "$COMMENT" | gh pr comment "$PR_NUMBER" --body-file -

          # --- Summary ---
          echo -e "$COMMENT" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" = "true" ]; then
            echo "::error::PR quality gate failed"
            exit 1
          fi

          echo "All quality checks passed!"
