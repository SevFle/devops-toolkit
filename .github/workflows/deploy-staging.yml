name: Deploy to Staging

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
        description: 'Application name (used for container and tag prefix)'
      deploy_dir:
        type: string
        required: true
        description: 'Remote deployment directory (e.g., /opt/services/apps/myapp-beta)'
      image_name:
        type: string
        required: true
        description: 'Docker image name (e.g., ghcr.io/owner/repo)'
      docker_compose_path:
        type: string
        default: 'docker-compose.yml'
      health_check_wait:
        type: number
        default: 50
        description: 'Seconds to wait for health check after deploy'
      health_check_retries:
        type: number
        default: 6
        description: 'How many times to poll container health before failing'
      env_vars:
        type: string
        default: ''
        description: 'Newline-separated KEY=VALUE pairs for runtime env'
      required_env_vars:
        type: string
        default: ''
        description: 'Comma-separated required env var names to validate'
      environment_name:
        type: string
        default: 'staging'
        description: 'GitHub environment name for deployment protection rules'
      pre_deploy_command:
        type: string
        default: ''
        description: 'Optional command to run on the target host before deployment'
      migrate_command:
        type: string
        default: ''
        description: 'Optional migration command to run on the target host'
      post_deploy_command:
        type: string
        default: ''
        description: 'Optional command to run on the target host after deployment'
      runners:
        type: string
        default: 'self-hosted'
    secrets:
      DEPLOY_HOST:
        required: true
      DEPLOY_USER:
        required: true
      DEPLOY_SSH_KEY:
        required: true
      DEPLOY_PORT:
        required: false
      NOTIFY_WEBHOOK_URL:
        required: false

jobs:
  deploy:
    runs-on: ${{ fromJSON(startsWith(inputs.runners, '[') && inputs.runners || format('["{0}"]', inputs.runners)) }}
    environment: ${{ inputs.environment_name }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute staging version
        id: version
        run: |
          # Try package.json first, fallback to git tag
          if [ -f package.json ]; then
            BASE_VERSION=$(jq -r .version package.json 2>/dev/null || echo "0.0.0")
          else
            BASE_VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          fi
          PREFIX="v${BASE_VERSION}-beta-"
          git fetch --tags --force
          LAST_TAG=$(git tag --list "${PREFIX}*" | sort -V | tail -n 1 || true)

          if [ -z "$LAST_TAG" ]; then
            NEXT_BETA=1
          else
            LAST_NUM=${LAST_TAG##*-beta-}
            if [ -z "$LAST_NUM" ] || ! echo "$LAST_NUM" | grep -Eq '^[0-9]+$'; then
              NEXT_BETA=1
            else
              NEXT_BETA=$((LAST_NUM + 1))
            fi
          fi

          VERSION="${PREFIX}${NEXT_BETA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create staging tag
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Build Docker image
        uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ inputs.image_name }}:beta
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Transfer image to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          docker save ${{ inputs.image_name }}:beta | \
            ssh -p ${{ secrets.DEPLOY_PORT || 22 }} \
                -i ~/.ssh/deploy_key \
                ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
                'docker load'

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        env:
          ENV_VARS_CONTENT: ${{ inputs.env_vars }}
          REQUIRED_ENV_VARS: ${{ inputs.required_env_vars }}
          PRE_DEPLOY_COMMAND: ${{ inputs.pre_deploy_command }}
          MIGRATE_COMMAND: ${{ inputs.migrate_command }}
          POST_DEPLOY_COMMAND: ${{ inputs.post_deploy_command }}
          HEALTH_RETRIES: ${{ inputs.health_check_retries }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: ENV_VARS_CONTENT,REQUIRED_ENV_VARS,PRE_DEPLOY_COMMAND,MIGRATE_COMMAND,POST_DEPLOY_COMMAND,HEALTH_RETRIES
          script: |
            set -euo pipefail
            cd ${{ inputs.deploy_dir }}

            if [ -n "$PRE_DEPLOY_COMMAND" ]; then
              bash -lc "$PRE_DEPLOY_COMMAND"
            fi

            # Write env file if provided
            if [ -n "$ENV_VARS_CONTENT" ]; then
              TMP_ENV=$(mktemp)
              echo "$ENV_VARS_CONTENT" > "$TMP_ENV"

              # Validate required vars
              IFS=',' read -ra REQUIRED <<< "$REQUIRED_ENV_VARS"
              for var in "${REQUIRED[@]}"; do
                var=$(echo "$var" | xargs)
                if [ -n "$var" ] && ! grep -Eq "^${var}=.+$" "$TMP_ENV"; then
                  echo "Missing required: $var"
                  rm -f "$TMP_ENV"
                  exit 1
                fi
              done

              TMP_OVERRIDE=$(mktemp)
              cat > "$TMP_OVERRIDE" <<EOF
            services:
              ${{ inputs.app_name }}:
                env_file:
                  - $TMP_ENV
            EOF
            else
              TMP_OVERRIDE=''
              TMP_ENV=''
            fi

            if [ -n "$MIGRATE_COMMAND" ]; then
              bash -lc "$MIGRATE_COMMAND"
            fi

            if [ -n "$TMP_OVERRIDE" ]; then
              docker compose -f ${{ inputs.docker_compose_path }} -f "$TMP_OVERRIDE" up -d --remove-orphans
            else
              docker compose -f ${{ inputs.docker_compose_path }} up -d --remove-orphans
            fi

            if [ -n "$POST_DEPLOY_COMMAND" ]; then
              bash -lc "$POST_DEPLOY_COMMAND"
            fi

            attempt=1
            healthy='false'
            while [ "$attempt" -le "$HEALTH_RETRIES" ]; do
              if docker ps --filter "name=${{ inputs.app_name }}" --format '{{.Status}}' | grep -qi 'healthy'; then
                healthy='true'
                break
              fi
              sleep ${{ inputs.health_check_wait }}
              attempt=$((attempt + 1))
            done

            [ -n "$TMP_OVERRIDE" ] && rm -f "$TMP_OVERRIDE"
            [ -n "$TMP_ENV" ] && rm -f "$TMP_ENV"

            if [ "$healthy" != 'true' ]; then
              echo 'Health check failed!'
              docker ps -a | grep "${{ inputs.app_name }}" || true
              docker logs "${{ inputs.app_name }}" --tail 100 || true
              exit 1
            fi

            echo 'Deployment successful!'

      - name: Summary
        if: always()
        run: |
          echo '## Staging Deployment' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment:** ${{ inputs.environment_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify webhook
        if: always() && secrets.NOTIFY_WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          payload=$(python3 - <<'PY'
          import json
          print(json.dumps({
              'workflow': 'deploy-staging',
              'repository': '${{ github.repository }}',
              'status': '${{ job.status }}',
              'environment': '${{ inputs.environment_name }}',
              'version': '${{ steps.version.outputs.version }}',
          }))
          PY
            )
          curl -fsSL -X POST -H 'Content-Type: application/json' -d "$payload" "$WEBHOOK_URL"
